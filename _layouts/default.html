<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <nav class="nav-container">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="logo-bracket">&lt;</span><span class="logo-name">mbmaciel</span><span class="logo-slash">/&gt;</span>
      </a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" class="nav-link">Blog</a>
        <a href="https://mbmaciel.com" class="nav-link" target="_blank" rel="noopener">Website</a>
        <a href="mailto:me@mbmaciel.com" class="nav-cta">Contato</a>
      </div>
    </nav>
  </header>

  <main class="main-content">
    {{ content }}
  </main>
